{% extends 'base.html' %}

{% block content %}
    <div class="row">
        <div class="col-12">
            {% if messages %}
                <ul class="flashes list-unstyled">
                    {% for category, message in messages %}
                        <li class="alert alert-{{ category }}">{{ message }}</li>
                    {% endfor %}
                </ul>
            {% endif %}
            <h1 class="mb-4">Анализатор страниц</h1>
            <p class="lead">Анализ страниц на SEO-пригодность</p>
            <form method="post" action="{{ url_for('add_url') }}" class="mb-4">
                <div class="input-group">
                    <input type="text" 
                        name="url" 
                        class="form-control" 
                        placeholder="https://example.com" 
                        required>
                    <button type="submit" class="btn btn-primary">Проверить</button>
                </div>
            </form>
        </div>
    </div>
{% endblock %}
