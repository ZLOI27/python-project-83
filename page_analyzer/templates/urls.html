{% extends 'base.html' %}

{% block content %}
    <h2>Сайты</h2>
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>ID</th>
                <th>Имя</th>
                <th>Последняя проверка</th>
                <th>Код ответа</th>
            </tr>
            <tbody>
                {% for url in urls %}
                <tr>
                    <td>{{ url['id'] }}</td>
                    <td>{{ url['name'] }}</td>
                    <td>{{ url['created_at'] }}</td>
                    <td>{{ url['response_status'] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </thead>
    </table>
{% endblock %}
